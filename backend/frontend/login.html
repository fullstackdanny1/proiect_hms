<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src = "api.js"></script>
    <style>
        body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f6;
    margin: 0;
    color: #333;
}

/* --- Login Page --- */
#login-form {
    max-width: 400px;
    margin: 100px auto; /* Centered on page */
    padding: 30px;
    background: white;
    border: 2px solid #2ecc71; /* Green outline */
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
}

#login-form h1 {
    text-align: center;
    color: #27ae60;
    margin-top: 0;
}

#login-form label {
    margin: 10px 0 5px;
    font-weight: bold;
}

#login-form input {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    margin-bottom: 15px;
}

#login-form button {
    background-color: #2ecc71;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.3s;
}

#login-form button:hover {
    background-color: #27ae60;
}
    </style>
</head>
<body>
    <form id = "login-form">
        <h1>Log in</h1>

        <label for = "username">Username:</label>
        <input type = "text" name ="username", id = "username">

        <label for = "password">Password:</label>
        <input type = "password" name ="password", id = "password">
        <button type="submit">Log in</button>
    </form>
    <script>
    document.getElementById("login-form").addEventListener("submit", userAuth)

    async function userAuth(event)
    {
        event.preventDefault()

        const username = document.getElementById("username").value
        const password = document.getElementById("password").value

        const userData = await getValidateUser(username, password)
        console.log("Response:", userData)

        if(userData != null) {

            localStorage.setItem("user", JSON.stringify(userData))
            window.location = "dashboard.html"
        } 
        else {
            window.alert("Invalid username or password")
        }
    }
    
    </script>
</body>

</html>
